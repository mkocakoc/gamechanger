name: Feature Request
description: Suggest an improvement for GameChanger
title: "feat: <short summary>"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      options:
        - Safe user-level setting
        - Medium (requires admin)
        - High (not recommended)
    validations:
      required: true
