name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (example: v0.5.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          py -m PyInstaller --clean --onefile --noconsole --name GameChanger src/main.py

      - name: Generate checksum
        shell: pwsh
        run: |
          Get-FileHash dist/GameChanger.exe -Algorithm SHA256 |
            ForEach-Object { "{0} *{1}" -f $_.Hash, "GameChanger.exe" } |
            Set-Content dist/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          files: |
            dist/GameChanger.exe
            dist/SHA256SUMS.txt
